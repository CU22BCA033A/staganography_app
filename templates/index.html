<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steganography App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <div class="container">
        <h1>Welcome to Steganography App</h1>
        <p>Encode and decode secret messages in images securely.</p>
        <div class="nav-links">
            <a href="{{ url_for('encode') }}">
                <i class="fas fa-lock"></i> Encode a Message
            </a>
            <a href="{{ url_for('decode') }}">
                <i class="fas fa-unlock"></i> Decode a Message
            </a>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 Steganography App. All rights reserved.</p>
    </footer>

    <script>
        // Dark Mode Toggle
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDarkMode = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDarkMode ? '☀️' : '🌙';
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
</body>
</html>
